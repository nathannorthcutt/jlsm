plugins {
    id 'java-library'
}

dependencies {
    api project(':modules:jlsm-core')
}

test {
    // Expose the unexported internal package to the unnamed test module
    jvmArgs '--add-exports', 'jlsm.memtable/jlsm.memtable.internal=ALL-UNNAMED'
    // Enable assertions so assert statements in implementation code are exercised
    jvmArgs '-ea'
}

eclipse {
    classpath {
        file {
            whenMerged { cp ->
                cp.entries.findAll {
                    it instanceof org.gradle.plugins.ide.eclipse.model.SourceFolder &&
                    it.path.startsWith('src/test')
                }.each {
                    it.entryAttributes['add.exports'] = 'jlsm.memtable/jlsm.memtable.internal=ALL-UNNAMED'
                }
            }
        }
    }
}
